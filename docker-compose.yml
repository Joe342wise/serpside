services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    networks:
      - app
    expose:
      - 8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    networks:
      - app
    ports:
      - "127.0.0.1:3001:3000"

networks:
  app:
